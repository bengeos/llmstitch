name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  check:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read version and check for existing tag
        id: gate
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists — no release on this merge."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$version does not exist — this merge will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TAG: v${{ needs.check.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Tag merge commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
      - name: Extract release notes from CHANGELOG
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capturing = 1; next }
            capturing && /^## \[/ { exit }
            capturing { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG — see CHANGELOG.md for notes." > release_notes.md
          fi
      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            dist/*
